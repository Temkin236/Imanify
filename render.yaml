services:
  - type: web
    name: imanify-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: "cd backend && npm install && npm run build"
    startCommand: "cd backend && npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        value: "file:./data/app.db"
      - key: CORS_ORIGIN
        value: "https://imanify.onrender.com"
      - key: GEMINI_API_KEY
        sync: false
