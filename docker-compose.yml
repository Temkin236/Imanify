version: '3.8'

services:
  # Backend Quran API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: imanify-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=5000
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000,http://localhost:5173}
      - ALQURAN_API_TIMEOUT=5000
      - API_CACHE_TTL_HOURS=24
      - LOG_FILE_PATH=./logs/server.log
    volumes:
      - ./backend/logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - imanify-network

  # Frontend Service (optional - for production)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: imanify-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://backend:5000/api
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - imanify-network

networks:
  imanify-network:
    driver: bridge

volumes:
  logs:
    driver: local
